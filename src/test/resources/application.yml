spring:
  application:
    name: event-management-system

  # Use H2 for testing
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false

  # Disable data.sql in tests
  sql:
    init:
      mode: never

# Test logging
logging:
  level:
    root: ERROR
    com.eventmanagement: INFO
